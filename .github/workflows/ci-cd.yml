name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Git hygiene guard
        run: |
          set -euo pipefail
          forbidden="$(git ls-files | grep -E '^(docs/plans/|docs/.*-prompt\.md$|history/.*\.txt$|history/CLAUDE\.md$|dist/|htmlcov/|coverage\.(xml|json)$|\.coverage$|\.hypothesis/|\.mutmut-cache/|\.playwright-mcp/|\.DS_Store$|.*/\.DS_Store$)' || true)"
          if [ -n "${forbidden}" ]; then
            echo "Forbidden tracked files detected:"
            echo "${forbidden}"
            exit 1
          fi

      - name: Docs sync check
        run: |
          python3 scripts/check_docs_sync.py
          python3 scripts/check_version_sync.py

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.19"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run pyright

      - name: Tests with coverage
        run: uv run pytest --cov --cov-branch --cov-fail-under=0 --cov-report=term-missing --cov-report=json

      - name: Coverage thresholds
        run: uv run python scripts/check_coverage_thresholds.py coverage.json --statements=95 --branches=85

      - name: Interactive modules coverage guardrail
        run: uv run coverage report --include="src/arxiv_browser/actions/*.py,src/arxiv_browser/browser/*.py,src/arxiv_browser/cli.py" --fail-under=85

      - name: Quality budget
        run: uv run python scripts/check_quality_budgets.py coverage.json

  quality:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.19"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked

      - name: Complexity gate
        run: uv run xenon src/arxiv_browser/ --max-absolute C --max-modules C --max-average B

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r src/arxiv_browser

      - name: Dead code check
        run: uv run vulture src/arxiv_browser --min-confidence 80

      - name: Dependency hygiene
        run: uv run deptry .

      - name: Dependency CVE audit (block on known vulnerabilities)
        run: |
          uv export --format requirements.txt --all-groups --no-emit-project --no-emit-package pip --frozen \
            | uv run pip-audit -r /dev/stdin --strict --require-hashes --disable-pip

      - name: Python file-size soft cap report
        run: |
          uv run python scripts/report_python_file_sizes.py \
            --github-actions \
            --path-prefix src/arxiv_browser \
            --soft-cap 1000 \
            --near-cap 900 \
            --strict

      - name: App size guardrail
        run: |
          APP_LINES=$(wc -l < src/arxiv_browser/app.py)
          echo "src/arxiv_browser/app.py lines: ${APP_LINES}"
          test "${APP_LINES}" -le 5000

  publish:
    needs: [ci, quality]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.19"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
