repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-docs-sync
        name: check docs stay aligned with CLI/config/keybindings
        entry: python3 scripts/check_docs_sync.py
        language: system
        pass_filenames: false
        files: '^(README\.md|CLAUDE\.md|docs/.*|src/arxiv_browser/(cli|completions|config|llm|models|ui_constants)\.py)$'
      - id: check-version-sync
        name: check pyproject version matches CHANGELOG
        entry: python3 scripts/check_version_sync.py
        language: system
        pass_filenames: false
        files: '^(pyproject\.toml|CHANGELOG\.md)$'
